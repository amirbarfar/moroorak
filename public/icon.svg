<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Checkmark circle (outer) -->
  <circle cx="256" cy="220" r="100" fill="none" stroke="white" stroke-width="28" stroke-opacity="0.3"/>

  <!-- Clock hands — top tick marks -->
  <line x1="256" y1="136" x2="256" y2="156" stroke="white" stroke-width="20" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="340" y1="160" x2="327" y2="176" stroke="white" stroke-width="16" stroke-linecap="round" stroke-opacity="0.35"/>
  <line x1="172" y1="160" x2="185" y2="176" stroke="white" stroke-width="16" stroke-linecap="round" stroke-opacity="0.35"/>

  <!-- Hour hand -->
  <line x1="256" y1="220" x2="256" y2="168" stroke="white" stroke-width="22" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="256" y1="220" x2="310" y2="220" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="220" r="12" fill="white"/>

  <!-- Bottom check items -->
  <rect x="148" y="358" width="216" height="22" rx="11" fill="white" fill-opacity="0.9"/>
  <rect x="148" y="394" width="160" height="22" rx="11" fill="white" fill-opacity="0.5"/>

  <!-- Small check on left -->
  <circle cx="126" cy="369" r="14" fill="white" fill-opacity="0.9"/>
  <polyline points="120,369 124,374 133,363" fill="none" stroke="#6366f1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
